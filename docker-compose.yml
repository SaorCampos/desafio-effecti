services:

  db:
    image: postgres:14
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: effecti
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - erp

  app:
    container_name: effecti_app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/
    depends_on:
      - db
    environment:
      XDEBUG_MODE: debug
      XDEBUG_CONFIG: client_host=host.docker.internal
    volumes:
      - ./:/var/www
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - erp
    env_file:
      - .env

  nginx:
    container_name: effecti_nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8011:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/:/etc/nginx/conf.d/
    networks:
      - erp

networks:
  erp:
    driver: bridge

volumes:
  postgres_data:

